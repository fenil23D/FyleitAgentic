name: CD

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v1.0.0)"
        required: true
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        run: |
          pytest -q
          cd frontend
          npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/source.zip HEAD
          cd frontend
          zip -r ../dist/frontend-dist.zip dist

      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          files: |
            dist/source.zip
            dist/frontend-dist.zip
